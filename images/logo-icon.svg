<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 发光效果 -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主六角形背景 -->
  <g transform="translate(32, 32)">
    <!-- 外层六角形 -->
    <polygon points="0,-26 22.52,-13 22.52,13 0,26 -22.52,13 -22.52,-13" 
             fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    
    <!-- 中层六角形 -->
    <polygon points="0,-20 17.32,-10 17.32,10 0,20 -17.32,10 -17.32,-10" 
             fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    
    <!-- 内层六角形 -->
    <polygon points="0,-14 12.12,-7 12.12,7 0,14 -12.12,7 -12.12,-7" 
             fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  </g>
  
  <!-- 中心代码图标 -->
  <g transform="translate(32, 32)" filter="url(#iconGlow)">
    <!-- 左尖括号 -->
    <path d="M-8,-6 L-12,0 L-8,6" 
          stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 右尖括号 -->
    <path d="M8,-6 L12,0 L8,6" 
          stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 斜杠 -->
    <path d="M-3,-9 L3,9" 
          stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- 六角形顶点装饰 -->
  <g transform="translate(32, 32)">
    <circle cx="0" cy="-20" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="17" cy="-10" r="1" fill="rgba(255,255,255,0.3)"/>
    <circle cx="17" cy="10" r="1" fill="rgba(255,255,255,0.3)"/>
    <circle cx="0" cy="20" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="-17" cy="10" r="1" fill="rgba(255,255,255,0.3)"/>
    <circle cx="-17" cy="-10" r="1" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- 字母JS (小字) -->
  <text x="32" y="56" text-anchor="middle" fill="rgba(255,255,255,0.6)" 
       font-family="'Inter', sans-serif" font-size="7" font-weight="bold">JS</text>
</svg>
