<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff5f5" stroke="#f56565" stroke-width="2" stroke-dasharray="5,5"/>
  <g transform="translate(200,150)">
    <!-- Error icon -->
    <circle cx="0" cy="-20" r="25" fill="#fed7d7" stroke="#f56565" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#c53030">⚠</text>
    <!-- Text -->
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#c53030">图片加载失败</text>
    <text x="0" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9b2c2c">Image Not Found</text>
    <text x="0" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a0aec0">请检查图片路径或网络连接</text>
  </g>
</svg>
