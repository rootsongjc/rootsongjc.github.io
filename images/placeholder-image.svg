<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <g transform="translate(200,150)">
    <!-- Camera icon -->
    <circle cx="0" cy="-20" r="20" fill="#adb5bd"/>
    <rect x="-15" y="-5" width="30" height="20" rx="5" fill="#6c757d"/>
    <circle cx="0" cy="5" r="8" fill="#f8f9fa"/>
    <circle cx="0" cy="5" r="5" fill="#adb5bd"/>
    <!-- Landscape icon -->
    <polygon points="-25,15 -20,5 -10,5 -5,15" fill="#adb5bd"/>
    <polygon points="5,15 10,5 20,5 25,15" fill="#adb5bd"/>
    <circle cx="-15" cy="0" r="3" fill="#ffc107"/>
    <!-- Text -->
    <text x="0" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6c757d">图片占位符</text>
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#adb5bd">Image Placeholder</text>
  </g>
</svg>
