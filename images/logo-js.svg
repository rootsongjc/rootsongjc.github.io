<svg width="320" height="56" viewBox="0 0 320 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 白色渐变 -->
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="whiteGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 六角形图标容器 -->
  <g transform="translate(28, 28)">
    <!-- 外层六角形边框 -->
    <polygon points="0,-20 17.32,-10 17.32,10 0,20 -17.32,10 -17.32,-10" 
             fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    
    <!-- 内层六角形背景 -->
    <polygon points="0,-16 13.86,-8 13.86,8 0,16 -13.86,8 -13.86,-8" 
             fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- 代码符号 - 在六角形内部 -->
    <g filter="url(#whiteGlow)">
      <!-- 左尖括号 -->
      <path d="M-8,-6 L-12,0 L-8,6" 
            stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- 右尖括号 -->
      <path d="M8,-6 L12,0 L8,6" 
            stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- 斜杠 -->
      <path d="M-3,-10 L3,10" 
            stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>
    
    <!-- 六角形内部装饰点 -->
    <circle cx="0" cy="-12" r="1" fill="rgba(255,255,255,0.6)"/>
    <circle cx="10" cy="6" r="0.8" fill="rgba(255,255,255,0.5)"/>
    <circle cx="-10" cy="6" r="0.8" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- 分隔线 -->
  <line x1="64" y1="18" x2="64" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  
  <!-- 品牌文字 -->
  <g transform="translate(80, 0)">
    <!-- JIMMY SONG 一行显示 -->
    <text x="0" y="32" fill="white" 
          font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="20" font-weight="700" letter-spacing="2px" filter="url(#whiteGlow)">JIMMY SONG</text>
    
    <!-- 下划线装饰 -->
    <rect x="0" y="38" width="140" height="1.5" rx="0.75" fill="rgba(255,255,255,0.6)"/>
  </g>
  
  <!-- 右侧六角形装饰群组 -->
  <g transform="translate(260, 28)">
    <!-- 小六角形装饰 -->
    <g transform="scale(0.3)">
      <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" 
               fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    </g>
    
    <g transform="translate(16, -8) scale(0.25)">
      <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" 
               fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    </g>
    
    <g transform="translate(8, 12) scale(0.2)">
      <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" 
               fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    </g>
    
    <!-- 连接线装饰 -->
    <path d="M4,-4 L12,-6 M12,-6 L16,2 M8,8 L14,4" 
          stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  </g>
</svg>
