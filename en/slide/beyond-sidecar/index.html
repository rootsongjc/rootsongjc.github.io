<h2 id="challenges-of-service-meshes">Challenges of Service Meshes</h2>
<ul>
<li><strong>Resource overhead</strong> and <strong>operational complexity</strong> caused by Sidecar proxies</li>
<li><strong>Upgrades</strong> or <strong>restarts</strong> often require restarting all Pods</li>
<li>Increasing demand for <strong>high-performance and cost efficiency</strong></li>
</ul>
<p><strong>Key Question</strong>: Can we retain the core capabilities of a service mesh (security, observability, traffic control) while reducing intrusion and extra resource consumption for each Pod?</p>
</section>

<h2 id="core-components-of-ambient-mode">Core Components of Ambient Mode</h2>
<ul>
<li>ztunnel (L4):
<ul>
<li>Node-level proxy</li>
<li>Handles <strong>transparent traffic interception</strong> and <strong>mTLS encryption</strong></li>
<li>Most traffic only needs L4 forwarding</li>
</ul>
</li>
<li>Waypoint Proxy (L7):
<ul>
<li>Deploy as needed (Namespace / Service / Pod level)</li>
<li>Handles <strong>HTTP/gRPC</strong> functions (auth, routing, observability)</li>
</ul>
</li>
<li>Istio CNI
<ul>
<li>Replaces <code>istio-init</code> container, intercepts outbound traffic from Pods</li>
</ul>
</li>

<li><strong>Supports Two Modes</strong>: Compatible with <strong>Sidecar Mode</strong> and <strong>Ambient Mode</strong>.</li>

</li>

<ul>

<tr>
<td><strong>L7</strong></td>
<td>ztunnel → Waypoint Proxy</td>
<td>HTTP/gRPC requiring authentication, circuit breaking, routing, etc.</td>
</tr>
</tbody>
</table>

<h1 id="4-ambient-mode-vs-sidecar-mode">4. Ambient Mode vs. Sidecar Mode</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-background-image="url("background/slide2.png")uot;)uot;)" data-paginate="true" data-theme="gaia" data-style="img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; }    font-size: 0.75em; } " lang="en-US" data-marpit-pagination="26" style="--background-image:url("background/slide2.png");--paginate:true;--theme:gaia;--style:img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; } ;background-image:url("background/slide2.png");background-position:center;background-repeat:no-repeat;background-size:cover;t;background-size:cover;over;over;over;over;" data-marpit-pagination-total="31" data-size="16:9">
<h2 id="limitations-of-ambient-mode">Limitations of Ambient Mode</h2>
<p>The following features are supported in Sidecar Mode but not yet in Ambient Mode:</p>
<ul>
<li>Loss of fine-grained customization for individual Pods when using both Sidecar and Ambient Mode</li>
<li>Multi-cluster installation</li>
<li>Multi-network support</li>
<li>Virtual machine support</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-background-image="url("background/slide2.png")uot;)uot;)" data-paginate="true" data-class="x-small-font-table" data-theme="gaia" data-style="img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; }    font-size: 0.75em; } " lang="en-US" class="x-small-font-table" data-marpit-pagination="27" style="--background-image:url("background/slide2.png");--paginate:true;--class:x-small-font-table;--theme:gaia;--style:img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; } ;background-image:url("background/slide2.png");background-position:center;background-repeat:no-repeat;background-size:cover;t;background-size:cover;over;over;over;over;" data-marpit-pagination-total="31" data-size="16:9">
<h2 id="feature-and-difference-comparison">Feature and Difference Comparison</h2>
<table>
<thead>
<tr>
<th>Aspect</th>
<th><strong>Sidecar Mode</strong></th>
<th><strong>Ambient Mode</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Proxy Location</strong></td>
<td>Each Pod has an Envoy Sidecar</td>
<td>Node-level ztunnel + optional Waypoint Proxy</td>
</tr>
<tr>
<td><strong>Resource Overhead</strong></td>
<td>Consumes CPU/memory in every Pod</td>
<td>Lower, as proxies are shared at node or namespace level</td>
</tr>
<tr>
<td><strong>Operational Complexity</strong></td>
<td>Injecting/upgrading Sidecars requires restarting or rolling updates of all Pods</td>
<td>Easier deployment/upgrades, only ztunnel/Waypoint needs updating</td>
</tr>
<tr>
<td><strong>Performance</strong></td>
<td>Good isolation per Pod but overall higher overhead</td>
<td>Better L4 performance, L7 requires an additional hop</td>
</tr>
<tr>
<td><strong>Feature Completeness</strong></td>
<td>Mature, supports multi-cluster, VM, hybrid networks</td>
<td>Still evolving, some advanced features (multi-network, VM) not fully supported yet</td>
</tr>
<tr>
<td><strong>Typical Use Cases</strong></td>
<td>Strict isolation, fine-grained traffic control</td>
<td>Large-scale clusters needing <strong>lightweight</strong> management</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-background-image="url("background/slide2.png")uot;)uot;)" data-paginate="true" data-theme="gaia" data-style="img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; }    font-size: 0.75em; } " lang="en-US" data-marpit-pagination="28" style="--background-image:url("background/slide2.png");--paginate:true;--theme:gaia;--style:img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; } ;background-image:url("background/slide2.png");background-position:center;background-repeat:no-repeat;background-size:cover;t;background-size:cover;over;over;over;over;" data-marpit-pagination-total="31" data-size="16:9">
<h2 id="deployment-recommendations">Deployment Recommendations</h2>
<ul>
<li>If you already have a <strong>Sidecar</strong>-based architecture with mature features, it is best to continue using Sidecar.</li>
<li>If you prioritize <strong>resource savings</strong> and <strong>simplified operations</strong>, and most traffic is L4, <strong>consider adopting Ambient Mode</strong>.</li>
<li>If <strong>some applications</strong> still require Sidecar, a <strong>hybrid deployment</strong> can be considered (but requires extra planning).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-background-image="url("background/slide2.png")uot;)uot;)" data-paginate="true" data-class="lead" data-theme="gaia" data-style="img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; }    font-size: 0.75em; } " lang="en-US" class="lead" data-marpit-pagination="29" style="--background-image:url("background/slide2.png");--paginate:true;--class:lead;--theme:gaia;--style:img, svg { max-width: 100%; max-height: 40vh; height: auto; display: block; margin: auto; } .flex-container { display: flex; justify-content: space-between; } .column { width: 48%; } table { text-align: left; } section.small-font-table table { font-size: 0.75em; } section.x-small-font-table table { font-size: 0.6em; } section.small-font-ul ul { font-size: 0.75em; } ;background-image:url("background/slide2.png");background-position:center;background-repeat:no-repeat;background-size:cover;t;background-size:cover;over;over;over;over;" data-marpit-pagination-total="31" data-size="16:9">

</section>

<h2 id="key-takeaways">Key Takeaways</h2>
<ol>
<li><strong>Ambient Mode</strong>: Reduces proxy burden per Pod, lowers operational cost</li>
<li><strong>ztunnel + Waypoint</strong> architecture: Only uses Waypoint when L7 functions are needed</li>
<li>Although GA, be aware of <strong>multi-cluster / VM / multi-network</strong> limitations, best practices are still evolving</li>
<li>Use cases: <strong>Large-scale clusters with heavy L4 traffic</strong> + teams prioritizing <strong>resource and management efficiency</strong></li>
</ol>
</section>
